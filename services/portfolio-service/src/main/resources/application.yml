server:
  port: ${PORT:8082}

spring:
  application:
    name: portfolio-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/portfolio_db}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
  api-key: ${CLOUDINARY_API_KEY:demo}
  api-secret: ${CLOUDINARY_API_SECRET:demo}

media:
  storage:
    path: ${MEDIA_STORAGE_PATH:/app/uploads}
  public-base-url: ${MEDIA_PUBLIC_BASE_URL:http://localhost:8080}
