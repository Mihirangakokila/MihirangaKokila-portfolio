# Backend only — use when frontend is hosted on Vercel.
# Exposes API on port 8080. Put Caddy/nginx in front for HTTPS + custom domain.
# Usage: docker compose -f docker-compose.backend.yml --env-file .env up -d --build

services:
  mongodb:
    image: mongo:7
    container_name: mk-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - mk-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./services/auth-service
    restart: unless-stopped
    environment:
      - SPRING_DATA_MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017}/auth_db
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mk-network

  portfolio-service:
    build: ./services/portfolio-service
    restart: unless-stopped
    environment:
      - SPRING_DATA_MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017}/portfolio_db
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-demo}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-demo}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-demo}
      - MEDIA_PUBLIC_BASE_URL=${MEDIA_PUBLIC_BASE_URL:-http://localhost:8080}
      - MEDIA_STORAGE_PATH=/app/uploads
    volumes:
      - portfolio_uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mk-network

  blog-service:
    build: ./services/blog-service
    restart: unless-stopped
    environment:
      - SPRING_DATA_MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017}/blog_db
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mk-network

  contact-service:
    build: ./services/contact-service
    restart: unless-stopped
    environment:
      - SPRING_DATA_MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017}/contact_db
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mk-network

  api-gateway:
    build: ./api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - AUTH_SERVICE_URL=http://auth-service:8081
      - PORTFOLIO_SERVICE_URL=http://portfolio-service:8082
      - BLOG_SERVICE_URL=http://blog-service:8083
      - CONTACT_SERVICE_URL=http://contact-service:8084
    depends_on:
      - auth-service
      - portfolio-service
      - blog-service
      - contact-service
    networks:
      - mk-network

networks:
  mk-network:
    driver: bridge

volumes:
  mongodb_data:
  portfolio_uploads:
