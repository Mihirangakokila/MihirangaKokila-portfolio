server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Auth Routes
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/api/auth/**

        # Portfolio Public Routes
        - id: portfolio-public-service
          uri: ${PORTFOLIO_SERVICE_URL:http://portfolio-service:8082}
          predicates:
            - Path=/api/portfolio/type/**, /api/portfolio/category/**
            - Method=GET

        # Portfolio Admin Routes (Protected)
        - id: portfolio-admin-service
          uri: ${PORTFOLIO_SERVICE_URL:http://portfolio-service:8082}
          predicates:
            - Path=/api/portfolio/**
            - Method=POST,PUT,DELETE
          filters:
            - JwtAuthentication

        # Blog Public Routes
        - id: blog-public-service
          uri: ${BLOG_SERVICE_URL:http://blog-service:8083}
          predicates:
            - Path=/api/blog/**
            - Method=GET

        # Blog Admin Routes (Protected)
        - id: blog-admin-service
          uri: ${BLOG_SERVICE_URL:http://blog-service:8083}
          predicates:
            - Path=/api/blog/**
            - Method=POST,DELETE
          filters:
            - JwtAuthentication

        # Contact Submission Route (Public)
        - id: contact-public-service
          uri: ${CONTACT_SERVICE_URL:http://contact-service:8084}
          predicates:
            - Path=/api/contact
            - Method=POST

        # Contact Management Routes (Protected)
        - id: contact-admin-service
          uri: ${CONTACT_SERVICE_URL:http://contact-service:8084}
          predicates:
            - Path=/api/contact/**
            - Method=GET,PATCH,DELETE
          filters:
            - JwtAuthentication

jwt:
