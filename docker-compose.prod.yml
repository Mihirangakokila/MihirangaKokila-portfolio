# Production stack — run on a VPS with a public IP and domain.
# Usage: docker compose -f docker-compose.prod.yml --env-file .env up -d --build

services:
  mongodb:
    image: mongo:7
    container_name: mk-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - mk-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./services/auth-service
    container_name: mk-auth-service
    restart: unless-stopped
    environment:
      - SPRING_DATA_MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017}/auth_db
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mk-network

  portfolio-service:
    build: ./services/portfolio-service
    container_name: mk-portfolio-service
    restart: unless-stopped
    environment:
      - SPRING_DATA_MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017}/portfolio_db
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mk-network

  blog-service:
    build: ./services/blog-service
    container_name: mk-blog-service
    restart: unless-stopped
    environment:
      - SPRING_DATA_MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017}/blog_db
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mk-network

  contact-service:
    build: ./services/contact-service
    container_name: mk-contact-service
    restart: unless-stopped
    environment:
      - SPRING_DATA_MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017}/contact_db
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mk-network

  api-gateway:
    build: ./api-gateway
    container_name: mk-api-gateway
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - AUTH_SERVICE_URL=http://auth-service:8081
      - PORTFOLIO_SERVICE_URL=http://portfolio-service:8082
      - BLOG_SERVICE_URL=http://blog-service:8083
      - CONTACT_SERVICE_URL=http://contact-service:8084
    depends_on:
      - auth-service
      - portfolio-service
      - blog-service
      - contact-service
    networks:
      - mk-network

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    container_name: mk-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
    depends_on:
      - api-gateway
    networks:
      - mk-network

  caddy:
    image: caddy:2-alpine
    container_name: mk-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SITE_DOMAIN=${SITE_DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api-gateway
    networks:
      - mk-network

networks:
  mk-network:
    driver: bridge

volumes:
  mongodb_data:
  caddy_data:
  caddy_config:
